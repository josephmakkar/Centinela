<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="theme-color" content="#1a3d2b"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Centinela"/>
<title>Centinela Integrative Protocols</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Lora:wght@400;500;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;background:#0f2018;font-family:'Lora',Georgia,serif;}
#app{display:flex;flex-direction:column;height:100%;height:100dvh;}
#header{background:linear-gradient(135deg,#0c1a10,#1a3d2b);padding:0 14px;height:56px;
  display:flex;align-items:center;gap:10px;flex-shrink:0;border-bottom:2px solid #c8960c;
  padding-top:env(safe-area-inset-top,0px);}
#back-btn{background:rgba(200,150,12,.22);border:none;color:#c8960c;font-size:20px;
  width:36px;height:36px;border-radius:50%;cursor:pointer;display:flex;align-items:center;
  justify-content:center;font-weight:bold;flex-shrink:0;}
#species-toggle{display:flex;background:rgba(0,0,0,.3);border-radius:20px;padding:2px;gap:1px;flex-shrink:0;}
#species-toggle button{padding:5px 13px;border:none;cursor:pointer;border-radius:18px;
  font-family:inherit;font-size:13px;font-weight:600;transition:all .2s;}
#body{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;
  padding-bottom:env(safe-area-inset-bottom,0px);}
.bio-card{background:linear-gradient(135deg,#1a3d2b,#1e4a30);border-radius:12px;
  padding:13px 15px;margin:14px 14px 0;box-shadow:0 3px 16px rgba(0,0,0,.25);
  position:relative;overflow:hidden;}
.bio-card .wm{position:absolute;right:-18px;bottom:-18px;width:110px;height:110px;
  opacity:.08;object-fit:contain;pointer-events:none;}
.bio-card .rel{position:relative;}
.bio-card .dr{color:#c8960c;font-size:9.5px;letter-spacing:.14em;text-transform:uppercase;margin-bottom:4px;}
.bio-card .creds{color:#e8d5a3;font-size:13px;line-height:1.6;}
.bio-card .addr{color:#8aad8e;font-size:11px;margin-top:3px;}
.sys-label{color:#5a4a35;font-size:10px;letter-spacing:.1em;text-transform:uppercase;
  margin:12px 16px 6px;padding-left:2px;}
.sys-row{background:#fff;border-radius:10px;padding:13px 15px;margin:0 14px 8px;
  display:flex;align-items:center;gap:12px;box-shadow:0 1px 6px rgba(0,0,0,.07);
  border-left:4px solid #c8960c;cursor:pointer;transition:background .12s;}
.sys-row:active{background:rgba(200,150,12,.12)!important;}
.sys-row .ico{font-size:22px;flex-shrink:0;}
.sys-row .name{flex:1;font-size:15.5px;font-weight:600;color:#1a3d2b;}
.sys-row .arr{color:#c8960c;font-size:18px;font-weight:300;}
.diag-row{background:#fff;border-radius:10px;padding:13px 15px;margin:0 14px 8px;
  box-shadow:0 1px 6px rgba(0,0,0,.07);border-left:4px solid #2e7d32;cursor:pointer;
  transition:background .12s;}
.diag-row:active{background:rgba(46,125,50,.08)!important;}
.diag-row .dname{font-size:15.5px;font-weight:600;color:#1a3d2b;margin-bottom:6px;line-height:1.3;}
.tags{display:flex;gap:5px;flex-wrap:wrap;}
.tag{font-size:10px;padding:2px 8px;border-radius:10px;color:#fff;font-weight:700;}
.dx-header{background:linear-gradient(135deg,#1a3d2b,#1e4a30);padding:12px 16px;
  border-bottom:2px solid #c8960c;}
.dx-header .sp-lbl{color:#8aad8e;font-size:10px;letter-spacing:.12em;text-transform:uppercase;margin-bottom:4px;}
.soap-bar{background:#264d36;display:flex;flex-shrink:0;}
.soap-tab{flex:1;padding:10px 4px;border:none;cursor:pointer;font-family:inherit;
  border-bottom:3px solid transparent;transition:all .15s;}
.soap-tab.active{background:#f7f3ec;color:#1a3d2b;font-weight:700;border-bottom-color:#c8960c;}
.soap-tab:not(.active){background:transparent;color:#8aad8e;}
.soap-tab .sk{font-family:'Playfair Display',serif;font-size:18px;font-weight:800;line-height:1;display:block;}
.soap-tab .sl{font-size:9px;opacity:.7;display:block;}
.content-pad{padding:14px;}
.soap-card{background:#fff;border-radius:10px;padding:13px 15px;margin-bottom:10px;
  box-shadow:0 1px 6px rgba(0,0,0,.07);}
.soap-card.primary{background:linear-gradient(135deg,#1a3d2b,#2a5c3a);}
.soap-card .label{font-weight:700;margin-bottom:5px;font-size:12px;}
.soap-card p{font-size:14px;line-height:1.75;margin:0;}
.acc-wrap{border-radius:10px;overflow:hidden;margin-bottom:10px;box-shadow:0 2px 8px rgba(0,0,0,.1);}
.acc-hdr{padding:13px 15px;display:flex;align-items:center;gap:10px;cursor:pointer;}
.acc-hdr:active{opacity:.8;}
.acc-hdr .ico2{font-size:20px;flex-shrink:0;}
.acc-hdr .htitle{flex:1;font-size:14.5px;font-weight:700;}
.acc-arr{font-size:18px;font-weight:bold;display:inline-block;transition:transform .2s;}
.acc-arr.open{transform:rotate(90deg);}
.acc-body{padding:12px 12px 4px;background:#faf8f4;}
.item{border-radius:8px;padding:10px 13px;margin-bottom:8px;font-size:13.5px;line-height:1.65;}
.tcb{border-radius:9px;padding:12px 14px;margin-bottom:10px;}
.tcb .lbl{font-size:10px;letter-spacing:.1em;text-transform:uppercase;margin-bottom:4px;}
.pulse-row{display:flex;gap:8px;margin-bottom:10px;}
.pulse-row .tcb{flex:1;margin-bottom:0;}
.footer{margin-top:16px;padding:10px 13px;background:#ede8dc;border-radius:8px;
  border:1px solid #cfc6b0;font-size:11px;color:#6a5a4a;line-height:1.7;}
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-thumb{background:rgba(0,0,0,.15);border-radius:2px;}
</style>
</head>

<div id="app">
  <div id="header"></div>
  <div id="body"></div>
</div>

{id:“cat-ibd”,name:“IBD / Chronic Enteropathy”,tags:[“Chronic”,“Inflammatory”],soap:{
S:{cc:“Chronic vomiting (often food, not always hairball), diarrhea, weight loss, picky appetite, altered litter habits, bloating.”,hx:“Middle-aged to older. Often triaditis (concurrent pancreatitis + cholangiohepatitis — IBD is the GI component). Siamese and purebreds may be predisposed.”,owner:“Vomiting frequency, relation to eating, appearance (food vs bile), diarrhea characteristics, weight trend monthly.”},
O:{pe:“Weight loss (BCS <4/9), thickened intestinal loops, possible mesenteric LN, hepatomegaly if concurrent liver disease, poor coat.”,dx:“CBC/chemistry (B12/folate, TLI, albumin), fPL (pancreatitis), FeLV/FIV, fecal PCR, abdominal US (intestinal wall layering, LN), endoscopy + biopsy.”,notes:“CRITICAL: distinguish IBD from small cell lymphoma — treatment differs. Full-thickness biopsy may be needed. Triaditis requires concurrent approach.”},
A:{dx:“Feline IBD — Lymphoplasmacytic, Eosinophilic, or Neutrophilic”,ddx:“Small cell alimentary lymphoma (CRITICAL differential), hyperthyroidism, pancreatitis (triaditis), food-responsive enteropathy, parasites, Tritrichomonas, Cryptosporidium.”,prog:“IBD: good. Small cell lymphoma: fair-good (chlorambucil; median survival >2 years).”},
P:{
western:[“Prednisolone 1–2 mg/kg/day tapering (NOTE: cats need prednisolone NOT prednisone — poor conversion)”,“Chlorambucil 2 mg/cat q 2 weeks OR 20 mg/m² q 2 weeks (lymphoma or refractory IBD)”,“Novel protein diet trial × 8–12 weeks (rabbit, duck, venison)”,“Cobalamin SQ 250 mcg q 7d × 6 wks, then monthly if deficient (feline-specific dosing)”,“Metronidazole 7.5–10 mg/kg BID (compounded fish-flavored for compliance)”,“Treat concurrent pancreatitis/cholangitis (triaditis protocol)”],
sp:[“Feline Enteric Support – ½–1 cap BID (open into food)”,“Okra Pepsin E3 – 1 cap BID between meals”,“Hepatic Support (Livaplex) – ½ cap BID (triaditis liver component)”,“Cataplex ACP – 1 tab BID (mucosal antioxidant)”,“Immuplex – ½ cap BID (immune modulation)”,“Cataplex B12 – 1 tab BID (B12 replenishment)”],
herb:[“Slippery Elm bark – ⅛ tsp BID in food (demulcent; safe for cats)”,“Marshmallow Root – 0.25 mL BID diluted tincture”,“Probiotics: Enterococcus faecium SF68 (Fortiflora) or Proviable-DC”,“N-Acetyl Glucosamine – 250–500 mg/day (intestinal mucosal support)”,“Slippery elm syrup (pre-made) — easier to administer in cats”],
tcvm:{pattern:“Spleen Qi Deficiency (most common) → Liver overacting on Spleen (stress worsening) / Cold-Damp accumulating in Middle Jiao”,tongue:“Pale, swollen, wet with teethmarks; greasy coating (Damp)”,pulse:“Deep, weak, slippery — especially right Guan (Spleen) position”,formula:“Si Jun Zi Tang (Four Gentlemen). Bu Zhong Yi Qi Tang if sinking weak digestion. Xiao Yao San if Liver invading Spleen.”,detail:“Bai Zhu + Fu Ling are primary Spleen Qi + Damp-drying herbs. Ren Shen or Dang Shen tonify Qi. Bu Zhong Yi Qi Tang adds Huang Qi and Sheng Ma/Chai Hu to lift prolapsing Middle Qi.”,source:“Jing Tang: GI Harmony (feline). Shi Pi San (Damp Spleen). Mayway: Si Jun Zi Wan, Bu Zhong Yi Qi Wan — feline dosing essential.”,points:“ST-36 (Zusanli) · BL-20 (Spleen Shu) · CV-12 (Zhongwan) · BL-21 (Stomach Shu) · SP-6 · PC-6 (Neiguan — nausea). Reduced needle depth/gauge for cats.”,dose:“Cats: 0.1–0.2 g/kg BID (~¼ the dog dose). Granule dissolved in warm water, mixed into food. Transdermal gel available for difficult cats.”},
diet:[“Novel single-protein canned food: rabbit, venison, duck, kangaroo — strict trial”,“Hydrolyzed protein if novel fails (Hill’s z/d, Royal Canin HP)”,“High moisture, low carbohydrate (<5% ME from CHO)”,“Warm food slightly to enhance palatability”,“Small frequent meals 3–4×/day”],
fp:“Weight + clinical signs recheck 4 weeks. B12 after supplementation series. Taper prednisolone over 3–4 months.”}}},

{id:“cat-lipidosis”,name:“Hepatic Lipidosis”,tags:[“Critical”,“Acute”,“Metabolic”],soap:{
S:{cc:“Anorexia >72 hours, jaundice, weight loss, vomiting, ptyalism, neurologic signs (HE) in severe cases.”,hx:“Obese cats highest risk. Triggered by: stress event, dietary change, concurrent illness causing anorexia. MOST COMMON liver disease in cats. Any cat not eating >72 hours needs immediate evaluation.”,owner:“CRITICAL: Duration of anorexia. Stress event preceding (move, new pet, diet change)? Prior weight estimate.”},
O:{pe:“Jaundice (sclera, ear pinnae, gums, skin), hepatomegaly, dehydration, weight loss, ptyalism. HE: obtundation, circling, seizures.”,dx:“Chemistry: ALP markedly elevated (>5× reference), ALT, GGT, bilirubin. Coagulation panel (PT/PTT). CBC. Abdominal US (diffusely hyperechoic liver — ‘brighter than spleen’). Liver aspirate (fat-laden hepatocytes — diagnostic).”,notes:“Check coagulopathy before liver biopsy. Vitamin K1 before any invasive procedure. E-tube placement is the cornerstone — owner commitment essential.”},
A:{dx:“Hepatic Lipidosis — with or without concurrent primary disease”,ddx:“Cholangiohepatitis, IBD-triaditis, GI lymphoma, pancreatitis, bile duct obstruction, neoplasia.”,prog:“Excellent with aggressive nutritional support via feeding tube (85%+ survival). Without mandatory caloric intake: grave.”},
P:{
western:[“Esophagostomy tube (E-tube) — DEFINITIVE treatment; home feeding by owner after training”,“IV/SQ fluid correction: LRS or Normosol (avoid dextrose initially)”,“Vitamin K1 0.5 mg/kg SQ q12h × 3 doses (coagulopathy before procedures)”,“SAMe (Denosyl feline) 90 mg/cat/day on empty stomach via tube”,“Maropitant 1 mg/kg SQ q24h (anti-emetic — facilitates tube feeding)”,“Feed gruel starting 25% RER; increase 25%/day to 100% (prevent refeeding syndrome)”],
sp:[“Livaplex – ½ cap BID via tube”,“Hepatrophin PMG – ½ tab BID crushed in tube feed”,“Cataplex E2 – ½ tab BID (tocopherol hepatoprotection)”,“Cataplex B – ½ tab BID (metabolic cofactors)”,“Drenamin – ½ tab BID (stress component is massive in lipidosis)”],
herb:[“Milk Thistle (Silymarin) – 50–100 mg/day via tube (hepatoprotective, antioxidant — best evidence for lipidosis)”,“Taurine – 250–500 mg/day via tube (OBLIGATE: taurine-conjugated bile acids critical for fat metabolism in cats)”,“L-Carnitine – 250–500 mg/day via tube (rate-limiting cofactor for hepatic fatty acid beta-oxidation)”,“Lecithin/Phosphatidylcholine – hepatocyte membrane regeneration”,“Dandelion root tea — liver tonic in recovery phase”],
tcvm:{pattern:“Liver Qi Stagnation → Phlegm-Damp accumulation + Blood Stasis (fat = Phlegm-Damp; stasis = Blood Stasis). Spleen Yang Deficiency as root.”,tongue:“Pale or purple, greasy white or yellow coating, swollen”,pulse:“Deep, wiry, slippery (Shen + Xian + Hua — stagnation + Phlegm)”,formula:“Xiao Yao San (smooth Liver Qi, support Spleen) + Er Chen Tang (dissolve Phlegm-Damp, harmonize Stomach).”,detail:“Er Chen Tang: Ban Xia (transforms Phlegm, stops vomiting), Chen Pi (moves Qi, dries Damp), Fu Ling (strengthens Spleen). Xiao Yao San addresses Liver Qi root; Er Chen Tang addresses Phlegm-Damp branch.”,source:“Jing Tang: Liver Happy (Xiao Yao San). Phlegm formula (Er Chen Tang base). Introduce via tube when vomiting controlled.”,points:“LV-14 (Qimen — Front Mu of Liver) · BL-18 (Gan Shu) · CV-12 (Zhongwan) · ST-36 (Zusanli — appetite) · PC-6 (Neiguan — anti-nausea) · ST-40 (Fenglong — transforms Phlegm)”,dose:“Introduce via E-tube once vomiting controlled (Day 2–4). ⅛ tsp granules BID in tube feed. Gradually increase.”},
diet:[“High-protein, moderate fat, low-CHO gruel via tube (Hill’s a/d, Royal Canin Recovery, or home-blend)”,“Target ≥30% protein DM (cats are obligate protein metabolizers)”,“Start at 25% RER Day 1; increase 25%/day (refeeding syndrome prevention)”,“Taurine + L-carnitine supplemented via tube (metabolically critical in cats)”,“Transition to voluntary eating with warm strong-smelling food (sardines, rotisserie chicken)”,“Remove E-tube when cat voluntarily eats >80% requirements for 3 consecutive days”],
fp:“E-tube minimum 4–8 weeks. LFTs weekly initially. Jaundice resolving = positive (1–4 weeks). Investigate and treat precipitating cause.”}}},
],

“Endocrine”:[
{id:“cat-hyper”,name:“Hyperthyroidism”,tags:[“Endocrine”,“Geriatric”,“Common”],soap:{
S:{cc:“Weight loss despite increased appetite, hyperactivity, vomiting, diarrhea, unkempt coat, increased vocalization especially at night, PU/PD.”,hx:“Most common endocrine disease in cats >10 years. Adenomatous hyperplasia/adenoma (bilateral 70%). Potential link to BPA-lined canned food, flame retardants. Siamese may be protected.”,owner:“Weight trends, appetite, activity/restlessness, night vocalization, litter box changes. Palpate thyroid ventrally at exam.”},
O:{pe:“Palpable thyroid lobe(s), tachycardia (HR >240 bpm), systolic heart murmur (functional), hypertension signs, poor/matted coat, thin BCS.”,dx:“Total T4 (elevated: diagnostic). Normal with suspicious signs: fT4 by equilibrium dialysis + T3 suppression. Blood pressure. Chest radiographs. Echo. Full chemistry (concurrent CKD masking).”,notes:“CRITICAL: treating hyperthyroidism can unmask concurrent CKD (normalized GFR reveals low renal reserve). Monitor renal function 1–2 months post-treatment.”},
A:{dx:“Feline Hyperthyroidism — adenomatous hyperplasia/adenoma”,ddx:“DM, IBD/GI malabsorption, CKD (concurrent), intestinal lymphoma, acromegaly (refractory/insulin-resistant DM).”,prog:“Excellent with I-131 (95% cure). Medical management effective but lifelong. CKD monitoring critical post-treatment.”},
P:{
western:[“Radioiodine I-131 — CURATIVE first-line (95% cure rate, single treatment)”,“Methimazole 2.5 mg BID–TID oral/transdermal (not curative; CBC/liver q 2–4 wks initially)”,“Surgical thyroidectomy if I-131 unavailable (hypoparathyroidism risk)”,“Iodine-restricted diet (Hill’s y/d) — requires strict compliance, no other food”,“Amlodipine 0.625–1.25 mg/cat/day for hypertension (systolic >160)”,“Recheck renal function 1–2 months post-methimazole (CKD unmasking)”],
sp:[“Cataplex B – 1 tab BID (B-vitamins: hypercatabolic metabolic support)”,“Drenamin – 1 tab BID (adrenal axis: hyperthyroid cats in sympathetic overdrive)”,“Min-Tran – 1 tab BID (mineral calming: heart rate, muscle tremor)”,“Cardiotrophin PMG – 1 tab BID (cardiac support: secondary HCM from hyperthyroidism)”,“Cataplex ACP – 1 tab BID (antioxidant protection)”,“Thytrophin PMG — per Palmquist autoimmune modulation theory; use with clinical judgment”],
herb:[“Bugleweed (Lycopus virginicus/europaeus) – 0.5 mL BID diluted tincture (inhibits TSH receptor binding, reduces T4 synthesis — evidence-based anti-thyroid herb)”,“Lemon Balm (Melissa officinalis) – anti-thyroid TSH receptor binding inhibition; calming”,“Motherwort (Leonurus cardiaca) – cardiac rate calming, thyroid-modulating”,“Hawthorn Berry – secondary cardiac support for functional tachycardia”,“CoQ10 – cardiac mitochondrial energetics”,“Taurine 250 mg BID (obligate feline cardiac nutrient)”],
tcvm:{pattern:“Liver Fire blazing upward (restlessness, vocalization, heat, rapid pulse, weight loss) + Kidney Yin Deficiency as root (Yin unable to control Yang)”,tongue:“Red, dry, scanty or no coating (Yin def with Fire); red tip + sides”,pulse:“Wiry, rapid, forceful (Xian, Shu, Shi — Liver Fire). Kidney pulse weak and thready.”,formula:“Long Dan Xie Gan Tang (drains Liver-Gallbladder Fire — acute/moderate). Zhi Bai Di Huang Wan (nourishes Kidney Yin, clears deficiency Fire — chronic/root).”,detail:“Long Dan Xie Gan Tang: Long Dan Cao + Huang Qin + Zhi Zi drain Fire. Ze Xie + Mu Tong + Che Qian Zi drain Damp-Heat via urine. Dang Gui + Sheng Di nourish Blood/Yin. Di Gu Pi San (Jing Tang hyperthyroid formula) uses Cortex Lycii to cool Blood and reduce thyroid hormone.”,source:“Jing Tang: Hyperthyroid formula (Di Gu Pi San base). Long Dan Xie Gan Wan (Mayway). Zhi Bai Di Huang Wan (Mayway).”,points:“LV-2 (Xingjian — sedates Liver Fire; primary anti-hyperthyroid point) · LI-11 (Quchi — clears Heat) · HT-7 (Shenmen — calms restlessness) · KI-3 (Taixi — Kidney Yin source) · SP-6 · CV-17 · BL-18 (Liver Shu)”,dose:“Cats: 0.1–0.2 g/kg BID. Di Gu Pi San (Jing Tang) most appropriate. Do NOT use warming/Yang-tonifying herbs — contraindicated. Use alongside methimazole; monitor T4.”},
diet:[“Iodine-restricted trial (Hill’s y/d) if owner declines methimazole — strict compliance required”,“Avoid fish-heavy diet (high iodine — potentially stimulates thyroid)”,“High-quality protein for muscle wasting/weight restoration”,“Wet food for hydration (concurrent CKD risk)”,“Taurine adequacy (cardiac protection)”],
fp:“T4 recheck 2–4 weeks after methimazole. BUN/Creat at 1–2 months post-treatment (CKD unmasking window). Blood pressure monthly.”}}},

{id:“cat-dm”,name:“Diabetes Mellitus”,tags:[“Endocrine”,“Chronic”,“Manageable”],soap:{
S:{cc:“Polyuria, polydipsia, weight loss despite polyphagia, plantigrade stance (dropped hocks — neuropathy), poor coat, lethargy, vomiting (DKA).”,hx:“Intact male, obese cats highest risk. Burmese overrepresented. Steroid/progestin history common precipitant. GOAL: diabetic remission achievable in 50–80% within 6 months.”,owner:“Discuss remission as primary goal (unlike dogs). Insulin injection technique. Home BG monitoring. Signs of hypoglycemia. Low-carb diet change critical.”},
O:{pe:“Obesity (often) or muscle wasting (chronic). Plantigrade posture (dropped hocks). Hepatomegaly. Dull coat.”,dx:“Fasting BG >270 mg/dL persistent; persistent glucosuria; Fructosamine (avoids stress artifact — critical in cats). Full chemistry. UA/culture.”,notes:“Fructosamine confirms chronic hyperglycemia vs. stress. Stress alone causes BG >300 in cats — do not diagnose on a single high BG.”},
A:{dx:“Diabetes Mellitus, Type 2-like — insulin-resistant initially, progressing to deficiency”,ddx:“Stress hyperglycemia (critical cat distinction), hyperthyroidism, acromegaly (refractory diabetes), steroid-induced DM.”,prog:“50–80% remission chance in first 6 months with low-carb diet + glargine insulin. Remission = primary treatment goal.”},
P:{
western:[“Glargine insulin (Lantus) 1–2 U/cat BID SQ — FIRST LINE for remission (best promotes beta-cell rest)”,“ProZinc 0.2–0.5 U/kg BID — alternative”,“Low-carbohydrate wet food CRITICAL: reduces BG spikes, lowers insulin demand dramatically”,“Home BG monitoring with AlphaTRAK 2 every 1–2 weeks initially”,“DKA: IV fluids, K+/Phos correction, regular insulin CRI”,“Screen for acromegaly if insulin doses >5 U/cat/injection (pituitary macroadenoma)”],
sp:[“Pancreatrophin PMG – 1 tab BID (pancreatic/beta cell support)”,“Cataplex GTF (Chromium) – 1 tab BID (insulin receptor sensitization)”,“Drenamin – 1 tab BID (cortisol/insulin counter-regulatory axis)”,“Cataplex B – 1 tab BID (metabolic enzyme cofactors)”,“Neurotrophin PMG – 1 tab BID (peripheral neuropathy support)”,“Cataplex E – 1 tab BID”],
herb:[“Berberine – 100–200 mg/day (AMPK activation: reduces hepatic glucose; use cautiously with insulin — monitor BG)”,“Cinnamon (Ceylon) – 100 mg/day (insulin receptor sensitization)”,“Gymnema sylvestre – supports beta-cell function”,“Fenugreek – slows glucose absorption”,“Milk Thistle – hepatoprotective for concurrent hepatopathy”,“CONTRAINDICATED in cats: Alpha-lipoic acid (hepatotoxic)”],
tcvm:{pattern:“Kidney Yin Deficiency — Wasting and Thirsting Disease (Xiao Ke): Upper = polydipsia; Middle = polyphagia (Stomach Fire/Heat); Lower = polyuria (Kidney Yin def)”,tongue:“Red, dry, little or no coating; possibly peeled (severe Yin exhaustion)”,pulse:“Thready, rapid (Xi, Shu) at Kidney position; full at Stomach if Middle Xiao”,formula:“Liu Wei Di Huang Wan. Zhi Bai Di Huang Wan if prominent Heat signs.”,detail:“Liu Wei Di Huang Wan treats three levels of Xiao Ke via Kidney Yin nourishment. Shu Di Huang is primary Kidney Yin tonic. Shan Zhu Yu astringes Jing. Shan Yao tonifies Spleen/Lung/Kidney. Three ‘draining’ herbs (Ze Xie, Fu Ling, Mu Dan Pi) prevent stagnation.”,source:“Jing Tang: Rehmannia 6 (Kidney Yin). Rehmannia Cool 8 (Heat prominent). Feline dosing: 0.1 g/kg BID.”,points:“SP-6 (Sanyinjiao — most important for Xiao Ke) · KI-3 (Taixi) · BL-20 (Spleen Shu) · BL-23 (Kidney Shu) · CV-4 (Guanyuan) · ST-36”,dose:“0.1–0.2 g/kg BID. Monitor BG when starting berberine with insulin. Adjust insulin as integrative protocol takes effect.”},
diet:[“CRITICAL: Low-carb wet food (<10% ME from CHO) — most impactful single intervention for remission”,“Avoid ALL dry food (high CHO 30–50% — directly opposes remission)”,“Consistent meal timing with insulin injections”,“High protein (obligate carnivore protein metabolism)”,“Target <5–8% ME from CHO (Fancy Feast pate varieties — low carb, cost-effective)”,“Monitor for hypoglycemia as insulin dose decreases with dietary change”],
fp:“Glucose curves every 1–2 weeks initially. Watch for hypoglycemia → give Karo syrup. Fructosamine q month. Watch for remission = normoglycemia → reduce then stop insulin.”}}},
],

“Urinary”:[
{id:“cat-flutd”,name:“FLUTD / Feline Idiopathic Cystitis”,tags:[“Acute”,“Painful”,“Stress-Related”],soap:{
S:{cc:“Straining to urinate, hematuria, pollakiuria, crying during urination, urinating outside litter box, excessive genital grooming.”,hx:“Young to middle-aged, indoor, overweight, stressed cats. FIC >60% of cases. Stress triggers: new pet, move, schedule disruption, litter box changes.”,owner:“CRITICAL FIRST QUESTION: Is the cat producing any urine at all? Straining without urine = OBSTRUCTION EMERGENCY (especially males). Household changes recently?”},
O:{pe:“Non-obstructed FIC: small contracted bladder, perineal irritation. Obstructed (EMERGENCY): firm distended bladder, pain, vomiting, weakness — bradycardia/arrhythmia possible.”,dx:“Urinalysis (hematuria, crystalluria), urine culture (usually sterile in young cats), radiographs/ultrasound (stones, sand, mass). Serum chemistry/K+ if obstructed.”,notes:“Urethral obstruction = life-threatening emergency. ASSESS FIRST at every FLUTD presentation. Male cats straining: check bladder immediately.”},
A:{dx:“Feline Idiopathic Cystitis (FIC) — predominantly stress-mediated neuroendocrine condition”,ddx:“Urolithiasis (struvite — diet-dissolvable; oxalate — surgical), urethral plug (OBSTRUCTION), UTI (rare <10 years), neoplasia (older cats), anatomic defects.”,prog:“FIC self-limiting 5–7 days. Recurrence common (50% in 12 months). Stress reduction + enrichment + diet change = key prevention.”},
P:{
western:[“Obstructed: emergency urethral catheterization + IV fluids + electrolyte correction (K+ management)”,“Non-obstructed: analgesia (buprenorphine 0.01–0.02 mg/kg OTM q6–8h), anti-inflammatory (meloxicam)”,“Prazosin 0.25–0.5 mg/cat BID (urethral spasm — post-obstructed cats)”,“Amitriptyline 2.5–5 mg/cat q24h (chronic recurrent FIC — analgesic, neurogenic bladder)”,“Environmental enrichment CRITICAL: 1 litter box per cat + 1 extra, clean daily, hiding spots, vertical spaces, play”,“Wet food ONLY + water fountain (increases urinary water content — most impactful long-term)”],
sp:[“Renafood – 1 tab BID (urinary/renal trophic support)”,“Drenamin – 2 tabs BID (CRITICAL: FIC is stress-mediated adrenal-neurogenic; adrenal support fundamental)”,“Min-Tran – 2 tabs BID (calming, mineral balance, stress response)”,“Cataplex C – 2 tabs BID (ascorbic acid: urinary support, antioxidant)”,“Calcium Lactate – 1–2 tabs BID (alkalizing/buffering support)”],
herb:[“Marshmallow Root – demulcent coating of bladder/urethra; anti-inflammatory; ideal for FIC (soothing, not diuretic)”,“Corn Silk (Zea mays) – gentle urinary anti-inflammatory, demulcent”,“Couch Grass (Agropyron repens) – demulcent, soothing to urothelium”,“Ashwagandha – 25–50 mg/cat/day (adaptogen — addresses stress-mediated neuroendocrine root of FIC)”,“CBD oil – 0.1–0.5 mg/kg BID (pain reduction, stress, anti-inflammatory)”],
tcvm:{pattern:“Damp-Heat in Bladder (acute, hematuria) / Kidney Yang Def + Bladder Qi Stagnation (chronic/cold) / Liver Qi Stagnation in Lower Jiao (stress-triggered FIC)”,tongue:“Acute: Red with yellow coating at root (Damp-Heat). Chronic/cold: Pale, white coating at root.”,pulse:“Acute: Slippery rapid. Chronic: Deep weak at Kidney/Bladder position.”,formula:“Acute Damp-Heat: Ba Zheng San (Eight Herb Correction — clears Damp-Heat from Bladder, relieves pain). Chronic/Qi stagnation: Wu Ling San (Five Ling — promotes water metabolism).”,detail:“Ba Zheng San: Mu Tong + Che Qian Zi + Qu Mai (promote urination, drain Damp-Heat); Bian Xu + Zhi Zi + Da Huang (clear Heat-toxin); Hua Shi (Talcum — slides passage clear); Deng Xin Cao (drains Heart Fire to Bladder via organ pairing). For stress-FIC: add Liver Qi smoothing herbs.”,source:“Jing Tang: Clear Bladder (Ba Zheng San modification — feline specific). Mayway: Ba Zheng San Wan. Wu Ling San for chronic/fluid metabolism.”,points:“BL-28 (Bladder Shu) · CV-3 (Zhongji — Front Mu of Bladder) · SP-6 · SP-9 (Yinlingquan — drains Damp) · KI-3 (Taixi) · LV-3 (Taichong — stress-FIC Liver Qi) · BL-40 (Weizhong)”,dose:“0.1–0.2 g/kg BID acute. Ba Zheng San 7–14 days acute. Transition to Shen Calmer/adaptogenic formula for chronic prevention.”},
diet:[“WET FOOD ONLY — most important intervention (increases urinary water, dilutes urine, reduces crystal saturation)”,“Add 30–60 mL extra water stirred into wet food daily”,“Multiple water stations; cat water fountain (prefer moving water)”,“Prescription urinary diets for stone management: Hill’s c/d, Royal Canin Urinary S/O”,“Eliminate all dry food”],
fp:“UA + culture 10–14 days post-treatment. Environmental enrichment audit (written checklist to owner). Recurrent FIC (>2 episodes): amitriptyline + comprehensive enrichment plan.”}}},

{id:“cat-ckd”,name:“CKD — Chronic Kidney Disease”,tags:[“Chronic”,“Geriatric”,“Progressive”],soap:{
S:{cc:“Weight loss, decreased appetite, polyuria/polydipsia, vomiting, lethargy, poor coat, oral ulcers, uremic halitosis, possible blood pressure signs.”,hx:“Affects 30–50% of cats >15 years. Gradual onset. Concurrent hypertension (65%), proteinuria, non-regenerative anemia. Dental disease may worsen CKD (bacteremia).”,owner:“Appetite changes. Water intake. Litter box frequency. Eye changes (hypertension red flag — retinal hemorrhage). Monthly weight trend.”},
O:{pe:“Small, irregular kidneys (fibrosis), dehydration, poor BCS/muscle wasting (temporal especially), pale mucous membranes, uremic ulcers, fundic changes (hypertension).”,dx:“SDMA, Creatinine (IRIS staging), BUN, phosphorus, Ca, CBC (non-regenerative anemia), UA (USG), UPC, blood pressure, abdominal ultrasound.”,notes:“IRIS staging: I (SDMA 18–25), II (Cr 1.6–2.8), III (Cr 2.9–5.0), IV (Cr >5.0). Sub-stage by UPC and BP. Dental care important.”},
A:{dx:“CKD — IRIS Stage I/II/III/IV with sub-staging”,ddx:“Hyperthyroidism (masks CKD by elevating GFR), AKI on chronic, pyelonephritis, renal lymphoma, FIP renal form, polycystic kidney disease (Persian, British Shorthair).”,prog:“Stage I–II: years. III: 1–3 years. IV: weeks–months. Goals: hypertension control, phosphorus management, anemia treatment.”},
P:{
western:[“Phosphate binders with meals (Stage II+): Epakitin, aluminum hydroxide, lanthanum (Lantharenol)”,“Renal diet: Hill’s k/d, Royal Canin Renal (palatability > dietary perfection in advanced CKD)”,“Amlodipine 0.625–1.25 mg/cat/day (hypertension — drug of choice in cats)”,“Benazepril 0.5–1 mg/kg/day (anti-proteinuric — caution Stage IV)”,“SubQ fluids 50–100 mL SID–BID (owners can be trained — most impactful Stage III–IV)”,“Darbepoetin for anemia when Hct <20% (specialist guidance)”],
sp:[“Renafood – 1–2 tabs BID”,“Renatrophin PMG – 1 tab BID (kidney protomorphogen)”,“Cataplex C – 2 tabs BID (antioxidant)”,“Cataplex B12 – 1 tab BID (B12 depletion in CKD)”,“Cataplex ACP – 1 tab BID (oxidative stress of uremia)”,“Min-Tran – 1 tab BID (electrolyte balance; monitor K+; hypokalemia common in feline CKD)”],
herb:[“Rehmannia glutinosa (Shu Di Huang) – Kidney Yin tonic (most fundamental kidney herb; multiple renoprotective studies)”,“Astragalus (Huang Qi) – reduces proteinuria, renoprotective, immune support”,“Cordyceps sinensis – improves GFR, creatinine, energy in CKD (multiple animal and human studies)”,“Dandelion Leaf – gentle supportive, anti-inflammatory”,“Omega-3 EPA/DHA fish oil – anti-inflammatory, anti-proteinuric”,“CoQ10 – mitochondrial support in tubular cells”],
tcvm:{pattern:“Kidney Yin Deficiency (early/moderate) → Yang Deficiency → Both Yin + Yang Deficiency (late) + Qi and Blood Deficiency (anemia, cachexia)”,tongue:“Yin def: red, dry, peeled. Yang def: pale, wet, swollen. Both: pale, dry.”,pulse:“Thready deep weak (Xi, Chen, Ruo) at Kidney position. Rapid if Yin def Heat; slow if Yang def.”,formula:“Ba Wei Di Huang Wan (Rehmannia 8 — most commonly appropriate for feline CKD). Liu Wei Di Huang Wan (Yin only) in early stages.”,detail:“Ba Wei Di Huang Wan = Liu Wei Di Huang (Kidney Yin) + Fu Zi (warm Kidney Yang) + Rou Gui (tonify Yang, warm Bladder Qi transformation). Both Yin and Yang depleted over time in CKD. Shu Di Huang (Rehmannia) nourishes Kidney Jing/Essence.”,source:“Jing Tang: Rehmannia 8 (most used for feline CKD). Kidney Disease Support (specific formula). Mayway: Ba Wei Di Huang Wan. Mandatory feline dose adjustment.”,points:“BL-23 (Kidney Shu — MOST IMPORTANT) · KI-3 (Taixi) · CV-4 (Guanyuan — nourish Yin) · GV-4 (Mingmen — Kidney Yang, MOXA if Yang def) · SP-6 · ST-36. Weekly acupuncture improves QoL and appetite in feline CKD.”,dose:“0.1–0.2 g/kg BID. Rehmannia 8 most commonly used. Moxa BL-23 + GV-4 if cold/Yang def. Weekly acupuncture shown to improve QoL and appetite.”},
diet:[“WET FOOD ONLY — most important single intervention (water intake)”,“Adequate high-quality protein (do not severely restrict early — muscle wasting worse than moderate P)”,“Potassium supplementation if hypokalemic (add potassium gluconate to food)”,“Phosphorus restriction while maintaining palatability”,“Omega-3 fish oil supplementation”],
fp:“IRIS staging + UA + BP q 3 months. Urine culture q 6–12 months. Dental prophylaxis under anesthesia (with fluids). Phosphorus and PTH.”}}},
],

“Respiratory”:[

// ── State ────────────────────────────────────────────────────
let state = { sp:‘dog’, view:‘systems’, sys:null, diagId:null, soap:‘S’, plan:null };

function setState(patch){ Object.assign(state,patch); render(); }

// ── Helpers ──────────────────────────────────────────────────
function el(tag,attrs,html){
const e=document.createElement(tag);
if(attrs) Object.entries(attrs).forEach(([k,v])=>{
if(k===‘style’&&typeof v===‘object’) Object.assign(e.style,v);
else if(k.startsWith(‘on’)) e.addEventListener(k.slice(2).toLowerCase(),v);
else e.setAttribute(k,v);
});
if(html!==undefined) e.innerHTML=html;
return e;
}

function allDiags(){
const pool=[];
Object.entries(DATA[state.sp]||{}).forEach(([sys,arr])=>
arr.forEach(d=>pool.push({…d,sys})));
return pool;
}

function getDiag(){ return allDiags().find(d=>d.id===state.diagId)||null; }

function tagHtml(tags){
return (tags||[]).map(t=>`<span class="tag" style="background:${TAG_CLR[t]||'#455a64'}">${t}</span>`).join(’’);
}
